<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTH_SUCCESS // BADWAVE</title>
  
  <!-- Google Fonts: Space Mono & Syncopate -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Space Mono"', 'monospace'],
            syncopate: ['"Syncopate"', 'sans-serif'],
          },
          colors: {
            theme: {
              300: "rgb(196, 181, 253)",
              400: "rgb(167, 139, 250)",
              500: "rgb(139, 92, 246)",
              600: "rgb(124, 58, 237)",
            },
            background: '#0a0a0f',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'glitch': 'glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            glitch: {
              '0%': { transform: 'translate(0)' },
              '20%': { transform: 'translate(-2px, 2px)' },
              '40%': { transform: 'translate(-2px, -2px)' },
              '60%': { transform: 'translate(2px, 2px)' },
              '80%': { transform: 'translate(2px, -2px)' },
              '100%': { transform: 'translate(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0f;
      color: white;
      overflow: hidden;
    }
    
    .grid-bg {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: 
        linear-gradient(to right, rgba(139, 92, 246, 0.5) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(139, 92, 246, 0.5) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        rgba(18, 16, 16, 0) 50%,
        rgba(0, 0, 0, 0.25) 50%
      );
      background-size: 100% 2px;
      pointer-events: none;
      z-index: 50;
    }

    .text-rgb-split {
      text-shadow: -1px 0 #ff00ff, 1px 0 #00ffff;
    }
    
    .hud-border {
      box-shadow: inset 0 0 15px rgba(139, 92, 246, 0.15), 0 0 30px rgba(0, 0, 0, 0.8);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen relative font-mono selection:bg-theme-500/30">
  <!-- 装飾背景 -->
  <div class="grid-bg"></div>
  <div class="scanline"></div>
  
  <div class="animate-fade-in max-w-md w-full mx-4 z-10 relative">
    
    <!-- HUD パネル -->
    <div class="bg-[#0a0a0f]/95 border border-theme-500/40 backdrop-blur-xl p-10 text-center relative hud-border group">
      
      <!-- HUD 装飾四隅 -->
      <div class="absolute -top-1 -left-1 w-3 h-3 border-t-2 border-l-2 border-theme-500"></div>
      <div class="absolute -top-1 -right-1 w-3 h-3 border-t-2 border-r-2 border-theme-500"></div>
      <div class="absolute -bottom-1 -left-1 w-3 h-3 border-b-2 border-l-2 border-theme-500"></div>
      <div class="absolute -bottom-1 -right-1 w-3 h-3 border-b-2 border-r-2 border-theme-500"></div>
      
      <!-- アクセントヘッダー -->
      <div class="absolute top-0 left-0 w-full flex justify-center opacity-30">
        <div class="h-[1px] w-1/2 bg-gradient-to-r from-transparent via-theme-500 to-transparent"></div>
      </div>

      <!-- 成功アイコン (サイバー風) -->
      <div class="flex justify-center mb-8 relative">
        <div class="relative w-16 h-16 border border-theme-500/50 p-2 flex items-center justify-center bg-black shadow-[0_0_20px_rgba(139,92,246,0.3)]">
          <!-- アイコン装飾 -->
          <div class="absolute top-0 left-0 w-2 h-2 border-t border-l border-theme-400"></div>
          <div class="absolute bottom-0 right-0 w-2 h-2 border-b border-r border-theme-400"></div>
          
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-theme-400 drop-shadow-[0_0_8px_rgba(139,92,246,0.8)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>
      </div>
      
      <h1 class="text-xl md:text-2xl font-bold mb-4 tracking-[0.2em] font-syncopate uppercase text-white drop-shadow-[0_0_10px_rgba(139,92,246,0.5)]">
        AUTH_SUCCESS
      </h1>
      
      <div class="text-theme-500/60 mb-10 text-sm tracking-widest leading-relaxed">
        <p>// CONNECTION_ESTABLISHED</p>
        <p class="mt-2 text-white/70">認証が完了しました。<br>このタブを閉じてアプリに戻ってください。</p>
      </div>
      
      <button onclick="window.close()" class="w-full py-4 px-4 bg-transparent text-theme-500 hover:text-white hover:bg-theme-500/10 transition-all duration-300 font-bold tracking-[0.2em] border border-theme-500/30 hover:border-theme-500 uppercase flex items-center justify-center relative group/btn">
        <div class="absolute top-0 left-0 w-1 h-1 border-t border-l border-theme-500/0 group-hover/btn:border-theme-500"></div>
        <div class="absolute bottom-0 right-0 w-1 h-1 border-b border-r border-theme-500/0 group-hover/btn:border-theme-500"></div>
        [ CLOSE_TAB ]
      </button>
    </div>
  </div>
  
  <!-- ウォーターマーク -->
  <div class="absolute bottom-8 left-0 w-full text-center text-theme-500/30 text-xs tracking-[0.4em] uppercase font-syncopate pointer-events-none">
    BADWAVE_SYS
  </div>
</body>
</html>
